<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet">
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html>

<head>
  <title>Medical Chatbot</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
</head>

<body>
  <div class="container-fluid h-100">
    <div class="row justify-content-center h-100">
      <div class="col-md-8 col-xl-6 chat">
        <div class="card">

          <!-- HEADER -->
          <div class="card-header msg_head">
            <div class="d-flex bd-highlight">
              <div class="img_cont">
                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
                <span class="online_icon"></span>
              </div>
              <div class="user_info">
                <span>Medical Chatbot</span>
                <p>Ask me anything!</p>
              </div>
            </div>
          </div>

          <!-- DISCLAIMER -->
          <div class="disclaimer">
            ⚠️ This chatbot provides informational responses only and does not constitute medical advice.
            Always consult a qualified healthcare professional for diagnosis, treatment, or emergencies.
          </div>

          <!-- CHAT BODY -->
          <div id="messageFormeight" class="card-body msg_card_body"></div>

          <!-- FOOTER -->
          <div class="card-footer">
            <form id="messageArea" class="input-group">
              <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off"
                class="form-control type_msg" required />
              <div class="input-group-append">
                <button type="submit" id="send" class="input-group-text send_btn">
                  <i class="fas fa-location-arrow"></i>
                </button>
              </div>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function () {
      $("#messageArea").on("submit", function (event) {
        const date = new Date();
        const hour = date.getHours();
        const minute = date.getMinutes();
        const str_time = hour + ":" + minute;

        var rawText = $("#text").val();

        var userHtml = `
          <div class="d-flex justify-content-end mb-4">
            <div class="msg_cotainer_send">
              ${rawText}
              <span class="msg_time_send">${str_time}</span>
            </div>
            <div class="img_cont_msg">
              <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png"
                class="rounded-circle user_img_msg">
            </div>
          </div>`;

        $("#text").val("");
        $("#messageFormeight").append(userHtml);

        $.ajax({
          data: { msg: rawText },
          type: "POST",
          url: "/get",
        }).done(function (data) {

          var botHtml = `
            <div class="d-flex justify-content-start mb-4">
              <div class="img_cont_msg">
                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                  class="rounded-circle user_img_msg">
              </div>
              <div class="msg_cotainer">
                ${data}
                <span class="msg_time">${str_time}</span>
              </div>
            </div>`;

          $("#messageFormeight").append($.parseHTML(botHtml));
        });

        event.preventDefault();
      });
    });
  </script>

</body>

</html>
